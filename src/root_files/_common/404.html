<!DOCTYPE html>
<html>
<head>
    <title>Deriv</title>
    <meta charset="utf-8" />
    <meta name='referrer' content='origin' />
    <script type="text/javascript">
    function getCookieItem(sKey) {
        'use strict';
        return decodeURIComponent(document.cookie.replace(new RegExp("(?:(?:^|.*;)\\s*" + encodeURIComponent(sKey).replace(/[\-\.\+\*]/g, "\\$&") + "\\s*\\=\\s*([^;]*).*$)|^.*$"), "$1")) || null;
    }

    var langs = {
        // TODO: uncomment if we enable id, ko and pt languages
        // 'id': 'id',
        // 'ko': 'kr',
        // 'pt': 'br|mz|ao|pt|gw|pg|cv|st',
        'de': 'de|at|li',
        'es': 'ar|bo|cl|co|cr|cu|do|ec|sv|gt|hn|mx|ni|pa|py|pr|es|uy|ve',
        'fr': 'fr|ad|bj|bf|cf|cg|ga|gn|ml|mc|ne|sn|tg',
        'it': 'it',
        'pl': 'po',
        'ru': 'ru|ua|by|kz',
        'th': 'th',
        'vi': 'vn',
        'zh_tw': 'tw|mo',
        'zh_cn': 'cn',
    };
    function getLanguage(country) {
        var conLang = 'en';
        if (country) {
            var keys = Object.keys(langs);
            for (var i = keys.length; i--; ) {
                var l = keys[i];
                if ((new RegExp(langs[l], 'i')).test(country)) {
                    return l;
                }
            }
        }
        return conLang;
    }

    function redirect(lang) {
        // Use proper hostname validation
        var isGitHubPages = /^[^.]+\.github\.io$/i.test(window.location.hostname);
        var base = isGitHubPages ? window.location.origin + '/binary-static' : window.location.origin;

        // Save language to localStorage for @deriv-com/translations
        if (lang) {
            localStorage.setItem('i18n_language', JSON.stringify(lang.toUpperCase()));
        }

        // redirect to /en/ page if pathname contains an unsupported language:
        const supported_langs_regex = Object.keys(langs).join('|');
        if (new RegExp(`^/(?!${supported_langs_regex})\\w{2,5}/\\w+`).test(window.location.pathname.toLowerCase())) {
            window.location.href = base + '/trading.html';
            return;
        }

        window.location.href = base + '/404.html';
    }

    function openWSAndGetLanguage(cb) {
        var ws = new WebSocket('wss://frontend.derivws.com/websockets/v3?app_id=1&brand=binary');

        ws.onopen = function() {
            ws.send(JSON.stringify({ website_status: 1 }));
        };

        ws.onmessage = function(msg) {
            var response = JSON.parse(msg.data);
            if (response.msg_type === 'website_status') {
                var lang;
                if (!response.error && response.hasOwnProperty('website_status')) {
                    lang = getLanguage(response.website_status.clients_country);
                }
                ws.close();
                return cb(lang);
            }
        };
    }

    var lang = getCookieItem('language');
    if (lang) {
        redirect(lang);
    } else {
        openWSAndGetLanguage(function(lang) {
            if (lang) redirect(lang);
        });
    }
    function getTopLevelDomain() {
        const current_domain = window.location.hostname;
        // Improved domain validation with proper TLD extraction
        if (current_domain && /^[a-z0-9.-]+\.[a-z]{2,}$/i.test(current_domain)) {
            const parts = current_domain.split('.');
            return parts[parts.length - 1];
        }
        return 'com';
    };
    
    function onLoad() {
        var btn__home = document.getElementById('btn__home');
        var tld = getTopLevelDomain();
        // Properly escape the TLD for use in URL
        var home_url = 'https://smarttrader.deriv.' + encodeURIComponent(tld);
        btn__home.href = home_url;
        btn__home.textContent = home_url;
    }
    document.addEventListener('DOMContentLoaded', function() {
        onLoad();
    }, false);
    </script>
</head>
<body>
    <h1>404</h1>
    <p style='font-size: 1.5em;'><a id='btn__home'></a></p>
</body>
</html>
